apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-blue
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
      version: blue
  template:
    metadata:
      labels:
        app: frontend
        version: blue
    spec:
      containers:
        - name: frontend-blue
          image: frontend-blue:v1
          imagePullPolicy: Never
          ports:
            - containerPort: 3100
          env:
            - name: VITE_API_URL
              value: "http://backend-service:5000"
