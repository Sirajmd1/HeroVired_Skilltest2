version: "3.9"

services:
  mongodb:
    image: mongo:7
    container_name: mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend
    container_name: backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      MONGO_URI: mongodb://admin:admin@mongodb:27017/bgapp?authSource=admin
    depends_on:
      - mongodb

  frontend-blue:
    build:
      context: ./frontend-blue
    container_name: frontend-blue
    restart: unless-stopped
    ports:
      - "3100:3100"
    environment:
      PORT: 3100
      REACT_APP_API_URL: http://localhost:5000
    depends_on:
      - backend

  frontend-green:
    build:
      context: ./frontend-green
    container_name: frontend-green
    restart: unless-stopped
    ports:
      - "3200:3200"
    environment:
      PORT: 3200
      REACT_APP_API_URL: http://localhost:5000
    depends_on:
      - backend

volumes:
  mongo_data:
